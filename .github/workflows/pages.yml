name: Deploy VitaMoo to GitHub Pages

# Manual trigger only — each fork/repo must:
#   1. Enable Pages: Settings > Pages > Source: GitHub Actions
#   2. (Optional) Set custom domain in Settings > Pages > Custom domain
#   3. Trigger this workflow manually, or add a push trigger for automation
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: vitamoo
        run: npm ci

      - name: Build library and demo
        working-directory: vitamoo
        run: npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: vitamoo/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
