name: Deploy VitaMooSpace to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build vitamoo core
        run: pnpm --filter vitamoo run build

      - name: Build mooshow
        run: pnpm --filter mooshow run build

      - name: Build vitamoospace
        env:
          BASE_PATH: ${{ secrets.BASE_PATH || format('/{0}', github.event.repository.name) }}
        run: pnpm --filter vitamoospace run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: vitamoo/vitamoospace/build

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
